name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Reject tracked private workbooks
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files | grep -Eiq '\.(xlsx|xls|xlsm|xlsb|ods)$'; then
            echo "Private workbook is tracked by Git. Deployment stopped."
            exit 1
          fi
      - name: Build public artifact
        run: python3 .github/scripts/build_pages_artifact.py
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
